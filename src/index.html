<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zip Tool App</title>
  <style>
    :root { font-family: sans-serif; background: #f4f4f9; color: #333; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .container { width: 400px; padding: 20px; background: white; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    .drop-zone { border: 2px dashed #007bff; border-radius: 8px; padding: 40px 20px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
    .drop-zone:hover { background: #e7f3ff; }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
    button:hover { background: #0056b3; }
    #status { margin-top: 15px; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h2>ZIP Tool Pro</h2>
  
  <div id="drop-zone" class="drop-zone">
    ここにファイルをドロップするか<br>クリックして選択
  </div>

  <button id="btn-compress">選択したファイルをZIP圧縮</button>
  <button id="btn-extract" style="background: #28a745;">ZIPファイルを解凍</button>

  <div id="status">待機中...</div>
</div>

<script type="module">
  // TauriのAPIを読み込む
  const { invoke } = window.__TAURI__.tauri;
  const { open, save } = window.__TAURI__.dialog;

  let selectedFiles = [];

  const dropZone = document.getElementById('drop-zone');
  const status = document.getElementById('status');

  // ファイル選択（クリック時）
  dropZone.addEventListener('click', async () => {
    const selected = await open({ multiple: true });
    if (selected) {
      selectedFiles = Array.isArray(selected) ? selected : [selected];
      status.innerText = `${selectedFiles.length} 個のファイルを選択中`;
    }
  });

  // 圧縮実行
  document.getElementById('btn-compress').addEventListener('click', async () => {
    if (selectedFiles.length === 0) return alert("ファイルを選択してください");
    
    const savePath = await save({ filters: [{ name: 'Zip', extensions: ['zip'] }] });
    if (!savePath) return;

    status.innerText = "圧縮中...";
    try {
      const res = await invoke("compress_files", { inputPaths: selectedFiles, outputZipPath: savePath });
      status.innerText = res;
    } catch (e) {
      status.innerText = "エラー: " + e;
    }
  });

  // 解凍実行
  document.getElementById('btn-extract').addEventListener('click', async () => {
    const zipPath = await open({ filters: [{ name: 'Zip', extensions: ['zip'] }] });
    if (!zipPath) return;

    const destDir = await open({ directory: true });
    if (!destDir) return;

    status.innerText = "解凍中...";
    try {
      const res = await invoke("extract_zip", { zipPath, destDirPath: destDir });
      status.innerText = res;
    } catch (e) {
      status.innerText = "エラー: " + e;
    }
  });
</script>

</body>
</html>
